name: Version

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    # Skip if the push was from this workflow (prevent infinite loops)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version bump
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Extract conventional commit type (e.g. "feat", "fix!", "feat(scope)")
          TYPE=$(echo "$COMMIT_MSG" | head -1 | sed -n 's/^\([a-z]*\)\(([^)]*)\)\?!*:.*/\1/p')
          BANG=$(echo "$COMMIT_MSG" | head -1 | grep -c '!:' || true)
          BREAKING=$(echo "$COMMIT_MSG" | grep -c 'BREAKING CHANGE' || true)

          echo "Type: $TYPE, Bang: $BANG, Breaking: $BREAKING"

          if [ "$BREAKING" -gt 0 ] || [ "$BANG" -gt 0 ]; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif [ "$TYPE" = "feat" ]; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ] || [ "$TYPE" = "refactor" ]; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump=skip" >> "$GITHUB_OUTPUT"
            echo "No version bump needed for type: $TYPE"
          fi

      - name: Bump version
        if: steps.bump.outputs.bump != 'skip'
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"

          # Read current version from root plugin.json
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "Current version: $CURRENT"

          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Compute new version
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update root marketplace plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' \
            .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json

          # Update marketplace.json (all plugin entries)
          jq --arg v "$NEW_VERSION" '.plugins[0].version = $v' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update rinda-ai plugin manifest
          jq --arg v "$NEW_VERSION" '.version = $v' \
            plugins/rinda-ai/.claude-plugin/plugin.json > tmp.json && mv tmp.json plugins/rinda-ai/.claude-plugin/plugin.json

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json plugins/rinda-ai/.claude-plugin/plugin.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --follow-tags
