name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rinda-cli-linux-x64
            mcp_artifact: rinda-mcp-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rinda-cli-linux-arm64
            mcp_artifact: rinda-mcp-linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: rinda-cli-macos-x64
            mcp_artifact: rinda-mcp-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: rinda-cli-macos-arm64
            mcp_artifact: rinda-mcp-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: rinda-cli-windows-x64.exe
            mcp_artifact: rinda-mcp-windows-x64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: rinda-cli-windows-arm64.exe
            mcp_artifact: rinda-mcp-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary (rinda-cli)
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p rinda-cli

      - name: Build release binary (rinda-mcp)
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p rinda-mcp

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/rinda ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/rinda.exe ${{ matrix.artifact }}

      - name: Rename MCP binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/rinda-mcp ${{ matrix.mcp_artifact }}

      - name: Rename MCP binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/rinda-mcp.exe ${{ matrix.mcp_artifact }}

      - name: Generate SHA256 checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          sha256sum ${{ matrix.mcp_artifact }} > ${{ matrix.mcp_artifact }}.sha256

      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash ${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -FilePath "${{ matrix.artifact }}.sha256" -Encoding ascii
          $mcp_hash = (Get-FileHash ${{ matrix.mcp_artifact }} -Algorithm SHA256).Hash.ToLower()
          "$mcp_hash  ${{ matrix.mcp_artifact }}" | Out-File -FilePath "${{ matrix.mcp_artifact }}.sha256" -Encoding ascii

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}.sha256
          path: ${{ matrix.artifact }}.sha256

      - name: Upload MCP binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mcp_artifact }}
          path: ${{ matrix.mcp_artifact }}

      - name: Upload MCP checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mcp_artifact }}.sha256
          path: ${{ matrix.mcp_artifact }}.sha256

  upload-assets:
    name: Upload Release Assets
    needs: [release-please, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Bundle plugin as zip
        run: cd plugins && zip -r "$GITHUB_WORKSPACE/artifacts/rinda-ai-plugin.zip" rinda-ai/

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            artifacts/rinda-cli-linux-x64
            artifacts/rinda-cli-linux-x64.sha256
            artifacts/rinda-cli-linux-arm64
            artifacts/rinda-cli-linux-arm64.sha256
            artifacts/rinda-cli-macos-x64
            artifacts/rinda-cli-macos-x64.sha256
            artifacts/rinda-cli-macos-arm64
            artifacts/rinda-cli-macos-arm64.sha256
            artifacts/rinda-cli-windows-x64.exe
            artifacts/rinda-cli-windows-x64.exe.sha256
            artifacts/rinda-cli-windows-arm64.exe
            artifacts/rinda-cli-windows-arm64.exe.sha256
            artifacts/rinda-mcp-linux-x64
            artifacts/rinda-mcp-linux-x64.sha256
            artifacts/rinda-mcp-linux-arm64
            artifacts/rinda-mcp-linux-arm64.sha256
            artifacts/rinda-mcp-macos-x64
            artifacts/rinda-mcp-macos-x64.sha256
            artifacts/rinda-mcp-macos-arm64
            artifacts/rinda-mcp-macos-arm64.sha256
            artifacts/rinda-mcp-windows-x64.exe
            artifacts/rinda-mcp-windows-x64.exe.sha256
            artifacts/rinda-mcp-windows-arm64.exe
            artifacts/rinda-mcp-windows-arm64.exe.sha256
            artifacts/rinda-ai-plugin.zip
