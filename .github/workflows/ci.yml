name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json is valid JSON
        run: jq empty .claude-plugin/plugin.json

      - name: Validate marketplace.json is valid JSON
        run: jq empty .claude-plugin/marketplace.json

      - name: Validate rinda-ai plugin.json is valid JSON
        run: jq empty plugins/rinda-ai/.claude-plugin/plugin.json

  check:
    name: Check (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (linux-x64-musl)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (rinda-cli)
        run: cargo build --release --target x86_64-unknown-linux-musl -p rinda-cli

      - name: Build release binary (rinda-mcp)
        run: cargo build --release --target x86_64-unknown-linux-musl -p rinda-mcp
