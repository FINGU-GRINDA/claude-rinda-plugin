[package]
name = "rinda-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rinda-mcp"
path = "src/main.rs"

[dependencies]
rinda-sdk = { path = "../sdk" }
rinda-common = { path = "../common" }
rmcp = { version = "1.1.1", features = ["server", "transport-io"] }
tokio = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "sync", "time", "process", "io-util"] }
serde_json = { workspace = true }
